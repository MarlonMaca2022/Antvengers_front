<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Antvengers</title>
    <!-- Google Fonts: Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="stilos/style.css">
</head>

<body class="dark">
    <div class="app-container">
        <div class="layout-container">
            <header>
                <div class="logo">
                    <div class="logo-icon">
                        <i class="bi bi-bug-fill" style="font-size: 1.5rem;"></i>
                    </div>
                    <h2 class="logo-text">Antvengers</h2>
                </div>
                <button class="menu-btn" id="theme-toggle">
                    <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
                </button>
            </header>

            <main>
                <!-- Left Side: Visual/Branding -->
                <section class="visual-side">
                    <div class="pattern-bg"></div>
                    <div class="visual-content">
                        <div class="hero-icon-container">
                            <i class="bi bi-shield-shaded"></i>
                        </div>
                        <h1 class="visual-title">Domina tus gastos hormiga</h1>
                        <p class="visual-subtitle">Pequeños gastos diarios pueden afectar tus finanzas. Regístralos y
                            toma el control de tu dinero..</p>
                    </div>
                    <div class="visual-gradient"></div>
                </section>

                <!-- Right Side: Login Form -->
                <section class="form-side">
                    <div class="form-container">
                        <div class="form-header fade-in">
                            <h2 class="form-title">Bienvenido</h2>
                            <p class="form-subtitle">Únete a los Antvengers</p>
                        </div>

                        <form class="auth-form fade-in delay-1" id="login-form">
                            <!-- Email -->
                            <div class="input-group">
                                <label class="input-label" for="email">Correo electrónico</label>
                                <div class="input-wrapper">
                                    <i class="bi bi-envelope input-icon"></i>
                                    <input type="email" id="email" class="form-input" placeholder="hero@antvengers.com"
                                        required>
                                </div>
                            </div>

                            <!-- Password -->
                            <div class="input-group">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <label class="input-label" for="password">contraseña</label>
                                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                                </div>
                                <div class="input-wrapper">
                                    <i class="bi bi-lock input-icon"></i>
                                    <input type="password" id="password" class="form-input" placeholder="••••••••"
                                        required>
                                    <button type="button" class="toggle-password" id="toggle-password">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Remember Me -->
                            <div class="remember-me">
                                <input type="checkbox" id="remember" class="checkbox">
                                <label for="remember" class="checkbox-label">Recuerdame</label>
                            </div>

                            <!-- Submit -->
                            <button type="submit" class="submit-btn" id="login-btn">
                                <span>Login</span>
                                <i class="bi bi-arrow-right"></i>
                            </button>
                        </form>

                        <!-- Footer Actions -->
                        <div class="divider fade-in delay-2">
                            <div class="divider-line"></div>
                            <span class="divider-text">¿Nuevo Heroe?</span>
                            <div class="divider-line"></div>
                        </div>

                        <a href="registro.html" style="text-decoration: none; width: 100%;">
                            <button class="secondary-btn fade-in delay-3">
                                Crear una cuenta
                            </button>
                        </a>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="/Scriptsitos/script.js"></script>
</body>

</html>
