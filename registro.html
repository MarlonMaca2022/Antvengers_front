<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Antvengers</title>
    <!-- Google Fonts: Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="stilos/style.css">
</head>
<body class="dark">
    <div class="app-container centered-layout">
        <div class="layout-container">
            <header>
                <div class="logo">
                    <div class="logo-icon">
                        <i class="bi bi-bug-fill" style="font-size: 1.5rem;"></i>
                    </div>
                    <h2 class="logo-text">Antvengers</h2>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <a href="index.html" class="menu-btn" title="Volver al Login">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <button class="menu-btn" id="theme-toggle">
                        <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
                    </button>
                </div>
            </header>
            
            <main style="padding: 2.5rem;">
                <div class="form-container" style="max-width: 100%;">
                    <div class="form-header fade-in">
                        <h2 class="form-title">Crear cuenta</h2>
                        <p class="form-subtitle">Únete a la comunidad de Antvengers hoy mismo.</p>
                    </div>
                    
                    <form class="auth-form fade-in delay-1" id="register-form">
                        <!-- Full Name -->
                        <div class="input-group">
                            <label class="input-label" for="fullname">Nombre completo</label>
                            <div class="input-wrapper">
                                <i class="bi bi-person input-icon"></i>
                                <input type="text" id="fullname" class="form-input" placeholder="Tu nombre y apellido" required>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="input-group">
                            <label class="input-label" for="email">Correo electrónico</label>
                            <div class="input-wrapper">
                                <i class="bi bi-envelope input-icon"></i>
                                <input type="email" id="email" class="form-input" placeholder="hero@antvengers.com" required>
                            </div>
                        </div>
                        
                        <!-- Password -->
                        <div class="input-group">
                            <label class="input-label" for="password">Contraseña</label>
                            <div class="input-wrapper">
                                <i class="bi bi-lock input-icon"></i>
                                <input type="password" id="password" class="form-input" placeholder="Crea una contraseña" required>
                                <button type="button" class="toggle-password">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="input-group">
                            <label class="input-label" for="confirm-password">Confirmar contraseña</label>
                            <div class="input-wrapper">
                                <i class="bi bi-lock-check input-icon"></i>
                                <input type="password" id="confirm-password" class="form-input" placeholder="Repite tu contraseña" required>
                                <button type="button" class="toggle-password">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        
                        <!-- Submit -->
                        <button type="submit" class="submit-btn" id="register-btn" style="margin-top: 1rem;">
                            <span>Registrarse</span>
                            <i class="bi bi-rocket-takeoff"></i>
                        </button>
                    </form>
                    
                    <div class="divider fade-in delay-2">
                        <div class="divider-line"></div>
                        <span class="divider-text">O regístrate con</span>
                        <div class="divider-line"></div>
                    </div>
                    
                    <div style="display: flex; gap: 1rem; margin-top: 1.5rem;" class="fade-in delay-2">
                        <button class="secondary-btn" style="margin-top:0; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <i class="bi bi-google"></i> Google
                        </button>
                        <button class="secondary-btn" style="margin-top:0; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <i class="bi bi-apple"></i> Apple
                        </button>
                    </div>

                    <div style="text-align: center; margin-top: 2rem;" class="fade-in delay-3">
                        <p class="form-subtitle" style="font-size: 0.875rem;">
                            ¿Ya tienes una cuenta? <a href="index.html" class="forgot-link">Inicia sesión aquí</a>
                        </p>
                    </div>

                    <p style="text-align: center; font-size: 0.75rem; color: var(--slate-400); margin-top: 2rem;" class="fade-in delay-3">
                        Al registrarte, aceptas nuestros <a href="#" class="forgot-link" style="font-size: 0.75rem;">Términos de Servicio</a> y <a href="#" class="forgot-link" style="font-size: 0.75rem;">Política de Privacidad</a>.
                    </p>
                </div>
            </main>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="Scriptsitos/script.js"></script>
</body>
</html>
